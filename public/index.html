<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ChatApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — 미드나잇 머티리얼 / 절제된 광택
══════════════════════════════════════════════════════════════ */
:root {
  --bg:        #0a0c11;
  --surface:   #10131a;
  --raised:    #181c26;
  --lift:      #1f2436;
  --hover:     #262c3e;
  --active:    #2e3550;

  --ink:       #dde1f0;
  --ink-2:     #7c85a8;
  --ink-3:     #3f465e;

  --line:      rgba(255,255,255,0.055);
  --line-2:    rgba(255,255,255,0.10);

  --teal:      #38d9c0;
  --teal-dim:  rgba(56,217,192,0.14);
  --teal-glow: rgba(56,217,192,0.07);
  --amber:     #f5a623;
  --rose:      #ff6b7a;
  --sage:      #6bcb8b;

  --r:  12px;
  --rm: 8px;
  --rs: 6px;

  --f-display: 'Syne', sans-serif;
  --f-body:    'DM Sans', sans-serif;

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
  --shadow:    0 8px 32px rgba(0,0,0,0.55);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);

  --dur: 160ms;
  --ease: cubic-bezier(0.4,0,0.2,1);

  --sidebar: 268px;
  --nav-h:   58px;
  --top-h:   54px;
}

[data-theme="light"] {
  --bg:        #eef0f7;
  --surface:   #ffffff;
  --raised:    #f4f5fc;
  --lift:      #eaedf8;
  --hover:     #e2e5f5;
  --active:    #d8dcf2;
  --ink:       #1a1d2e;
  --ink-2:     #555a7a;
  --ink-3:     #9499b8;
  --line:      rgba(0,0,0,0.07);
  --line-2:    rgba(0,0,0,0.13);
  --teal:      #1ab8a0;
  --teal-dim:  rgba(26,184,160,0.12);
  --teal-glow: rgba(26,184,160,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.10);
  --shadow:    0 8px 32px rgba(0,0,0,0.12);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f-body);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
button{cursor:pointer;font-family:var(--f-body);border:none;background:none;color:inherit}
input,textarea{font-family:var(--f-body);outline:none;border:none;background:none;color:var(--ink)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}
::placeholder{color:var(--ink-3)}

/* ── SCREEN MANAGER ────────────────────────────────────────── */
.screen{display:none}
.screen.on{display:flex}

/* ══════════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════════ */
#auth{
  height:100vh;
  align-items:center;
  justify-content:center;
  background: radial-gradient(ellipse 80% 60% at 70% -10%, var(--teal-dim), transparent),
              radial-gradient(ellipse 50% 50% at -10% 80%, rgba(56,217,192,0.05), transparent),
              var(--bg);
}
.auth-card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--line-2);
  border-radius:20px;
  padding:36px 32px 32px;
  box-shadow:var(--shadow-lg);
  animation:riseIn .4s var(--ease);
}
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.auth-brand{
  display:flex;align-items:center;gap:10px;
  margin-bottom:28px;
}
.auth-brand-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--teal),#2dd4bf);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 4px 16px rgba(56,217,192,0.3);
}
.auth-brand-name{font-family:var(--f-display);font-size:20px;font-weight:800;letter-spacing:-.4px}

.auth-pills{
  display:flex;
  background:var(--raised);
  border-radius:var(--rm);
  padding:3px;
  margin-bottom:24px;
}
.auth-pill{
  flex:1;padding:7px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--ink-2);
  text-align:center;transition:all var(--dur) var(--ease);
}
.auth-pill.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

.auth-form{display:flex;flex-direction:column;gap:13px}
.f-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px}
.f-row input{
  width:100%;padding:10px 13px;
  background:var(--raised);
  border:1px solid var(--line-2);
  border-radius:var(--rm);
  font-size:14px;
  transition:all var(--dur) var(--ease);
}
.f-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}

.auth-err{
  font-size:12px;color:var(--rose);
  background:rgba(255,107,122,.08);
  border:1px solid rgba(255,107,122,.2);
  border-radius:var(--rs);padding:8px 11px;display:none;
}

.btn-primary{
  width:100%;padding:11px;margin-top:2px;
  background:linear-gradient(135deg,var(--teal) 0%,#2dd4bf 100%);
  color:#0a1512;font-weight:700;font-size:14px;letter-spacing:.1px;
  border-radius:var(--rm);
  box-shadow:0 4px 20px rgba(56,217,192,0.25);
  transition:all var(--dur) var(--ease);
}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 28px rgba(56,217,192,0.35)}
.btn-primary:active{transform:translateY(0)}

/* ══════════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════════ */
#app{height:100vh;flex-direction:column}

/* Top bar */
.topbar{
  height:var(--top-h);flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  z-index:20;
}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  font-family:var(--f-display);font-weight:800;font-size:15px;letter-spacing:-.2px;
  flex-shrink:0;margin-right:6px;
}
.brand-dot{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--teal),#2dd4bf);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  box-shadow:0 2px 10px rgba(56,217,192,0.3);
}

/* Search */
.search-wrap{flex:1;max-width:340px;position:relative}
.search-wrap input{
  width:100%;padding:7px 12px 7px 34px;
  background:var(--raised);border:1px solid var(--line);
  border-radius:20px;font-size:13px;
  transition:all var(--dur) var(--ease);
}
.search-wrap input:focus{border-color:var(--teal);background:var(--surface);box-shadow:0 0 0 3px var(--teal-glow)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ink-3);pointer-events:none}

.search-drop{
  position:absolute;top:calc(100%+6px);left:0;right:0;
  background:var(--surface);border:1px solid var(--line-2);
  border-radius:var(--r);box-shadow:var(--shadow);
  z-index:50;overflow:hidden;display:none;
}
.search-drop.on{display:block;animation:riseIn .15s var(--ease)}
.s-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;cursor:pointer;font-size:13px;
  transition:background var(--dur) var(--ease);
}
.s-item:hover{background:var(--hover)}
.s-item-sub{font-size:11px;color:var(--ink-3);margin-top:1px}

.topbar-ctx{display:flex;flex-direction:column;line-height:1.2;margin-left:auto}
.topbar-ctx-name{font-size:14px;font-weight:600;font-family:var(--f-display)}
.topbar-ctx-sub{font-size:11px;color:var(--ink-2)}

/* ── BODY ─────────────────────────────────────────────────── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-tabs{display:flex;padding:8px 10px;gap:4px;border-bottom:1px solid var(--line)}
.sb-tab{
  flex:1;padding:6px;border-radius:var(--rs);
  font-size:12px;font-weight:600;color:var(--ink-3);
  text-align:center;transition:all var(--dur) var(--ease);
}
.sb-tab.on{background:var(--active);color:var(--teal)}

.sb-body{flex:1;overflow-y:auto;padding:6px}

.sb-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--ink-3);
  padding:8px 8px 4px;
  display:flex;align-items:center;justify-content:space-between;
}
.sb-label button{
  width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink-3);
  transition:all var(--dur) var(--ease);
}
.sb-label button:hover{background:var(--hover);color:var(--ink)}

.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 9px;border-radius:var(--rm);cursor:pointer;
  transition:all var(--dur) var(--ease);position:relative;
}
.sb-item:hover{background:var(--hover)}
.sb-item.on{background:var(--active)}
.sb-item-icon{font-size:15px;color:var(--ink-2);width:18px;text-align:center;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:500;color:var(--ink-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.on .sb-item-name{color:var(--ink)}
.sb-badge{
  background:var(--teal);color:#0a1512;
  font-size:10px;font-weight:800;
  padding:2px 6px;border-radius:10px;flex-shrink:0;
}

/* User row */
.u-row{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:var(--rm);cursor:pointer;
  transition:all var(--dur) var(--ease);
}
.u-row:hover{background:var(--hover)}
.u-info{flex:1;min-width:0}
.u-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-status-txt{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-pip{width:7px;height:7px;border-radius:50%;background:var(--ink-3);flex-shrink:0}
.status-pip.live{background:var(--sage)}

/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--f-display)}
.av-sm{width:28px;height:28px;font-size:11px}
.av-md{width:34px;height:34px;font-size:13px}
.av-lg{width:46px;height:46px;font-size:18px}

/* ── CHAT AREA ─────────────────────────────────────────────── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:var(--ink-3);
  background: radial-gradient(ellipse 60% 60% at 50% 50%, var(--teal-glow), transparent);
}
.welcome-icon{
  width:72px;height:72px;border-radius:18px;
  background:var(--raised);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.welcome h2{font-family:var(--f-display);font-size:18px;font-weight:700;color:var(--ink-2)}
.welcome p{font-size:13px;text-align:center;max-width:260px}

.msgs-wrap{flex:1;overflow-y:auto;padding:16px 18px 6px}
.msg-row{
  display:flex;align-items:flex-start;gap:9px;
  padding:3px 5px;border-radius:var(--rm);
  transition:background var(--dur) var(--ease);
}
.msg-row:hover{background:var(--raised)}
.msg-row.own{flex-direction:row-reverse}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px}
.msg-row.own .msg-meta{flex-direction:row-reverse}
.msg-who{font-family:var(--f-display);font-size:13px;font-weight:700}
.msg-ts{font-size:10px;color:var(--ink-3);letter-spacing:.3px}
.msg-bub{
  display:inline-block;max-width:460px;
  padding:8px 12px;border-radius:14px;
  font-size:13.5px;line-height:1.55;word-break:break-word;
  background:var(--raised);color:var(--ink);
  border:1px solid var(--line);
}
.msg-row.own .msg-bub{
  background:linear-gradient(135deg,var(--teal) 0%,#2dd4bf 100%);
  color:#0a1512;font-weight:500;border-color:transparent;
}
.sys-msg{text-align:center;color:var(--ink-3);font-size:11px;padding:6px 0;font-style:italic}
.group-gap{height:6px}

/* Typing */
.typing-bar{
  display:none;align-items:center;gap:7px;
  padding:4px 20px;font-size:12px;color:var(--ink-3);font-style:italic;
}
.t-dots{display:flex;gap:3px}
.t-dots span{
  width:5px;height:5px;background:var(--ink-3);border-radius:50%;
  animation:tdot 1.2s infinite;
}
.t-dots span:nth-child(2){animation-delay:.2s}
.t-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* Input */
.input-zone{padding:10px 16px 14px;background:var(--surface);border-top:1px solid var(--line)}
.input-row{
  display:flex;align-items:flex-end;gap:9px;
  background:var(--raised);border:1px solid var(--line-2);
  border-radius:14px;padding:9px 12px;
  transition:all var(--dur) var(--ease);
}
.input-row:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow)}
.chat-input{
  flex:1;font-size:14px;line-height:1.5;
  max-height:120px;resize:none;overflow-y:auto;
  background:transparent;
}
.send-btn{
  width:34px;height:34px;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal),#2dd4bf);
  border-radius:10px;color:#0a1512;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(56,217,192,0.25);
  transition:all var(--dur) var(--ease);
}
.send-btn:hover{filter:brightness(1.1);transform:scale(1.06)}

/* ── BOTTOM NAV ────────────────────────────────────────────── */
.bottom-nav{
  height:var(--nav-h);flex-shrink:0;
  background:var(--surface);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.nav-profile{
  display:flex;align-items:center;gap:9px;
  padding:5px 9px;border-radius:var(--rm);cursor:pointer;
  transition:all var(--dur) var(--ease);
}
.nav-profile:hover{background:var(--hover)}
.nav-profile-info{line-height:1.2}
.nav-pname{font-size:13px;font-weight:600;font-family:var(--f-display)}
.nav-pstatus{font-size:11px;color:var(--ink-2);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-actions{display:flex;gap:4px}
.nav-btn{
  width:36px;height:36px;border-radius:var(--rm);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--ink-2);
  transition:all var(--dur) var(--ease);
}
.nav-btn:hover{background:var(--hover);color:var(--ink)}

/* ══════════════════════════════════════════════════════════════
   PANELS (bottom sheets)
══════════════════════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(3px);
  z-index:100;
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.on{display:flex;animation:fadein .18s var(--ease)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.panel{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  width:100%;max-width:480px;
  padding:20px 22px 24px;
  border-top:1px solid var(--line-2);
  animation:panelup .28s var(--ease);
}
@keyframes panelup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-knob{width:36px;height:3px;background:var(--line-2);border-radius:2px;margin:0 auto 18px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.panel-title{font-family:var(--f-display);font-size:16px;font-weight:800}
.close-btn{font-size:18px;color:var(--ink-3);transition:color var(--dur) var(--ease)}
.close-btn:hover{color:var(--ink)}

.pf-row{margin-bottom:13px}
.pf-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px}
.pf-row input{
  width:100%;padding:9px 12px;
  background:var(--raised);border:1px solid var(--line-2);
  border-radius:var(--rm);font-size:14px;
  transition:all var(--dur) var(--ease);
}
.pf-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}

.panel-btn{
  width:100%;padding:11px;border-radius:var(--rm);
  font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--teal),#2dd4bf);
  color:#0a1512;
  box-shadow:0 4px 16px rgba(56,217,192,0.2);
  transition:all var(--dur) var(--ease);margin-top:4px;
}
.panel-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.panel-btn.danger{background:linear-gradient(135deg,var(--rose),#e53e3e);color:#fff;box-shadow:none}

/* Settings rows */
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--line);
}
.set-row:last-child{border-bottom:none}
.set-label{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500}
.set-icon{font-size:17px}

/* Toggle */
.toggle-wrap{position:relative;width:42px;height:22px}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;background:var(--line-2);
  border-radius:11px;cursor:pointer;
  transition:background var(--dur) var(--ease);
}
.toggle-track::before{
  content:'';position:absolute;
  width:16px;height:16px;background:#fff;
  border-radius:50%;left:3px;top:3px;
  transition:transform var(--dur) var(--ease);
}
.toggle-wrap input:checked + .toggle-track{background:var(--teal)}
.toggle-wrap input:checked + .toggle-track::before{transform:translateX(20px)}

/* Toast */
.toast{
  position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--raised);border:1px solid var(--line-2);
  border-radius:var(--rm);padding:9px 16px;
  font-size:13px;font-weight:500;
  z-index:999;opacity:0;white-space:nowrap;
  box-shadow:var(--shadow);
  transition:all .25s var(--ease);pointer-events:none;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-state{padding:20px 10px;text-align:center;color:var(--ink-3);font-size:12px;line-height:1.7}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     AUTH
══════════════════════════════════════════════════════════════ -->
<div id="auth" class="screen on">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-mark">💬</div>
      <span class="auth-brand-name">ChatApp</span>
    </div>

    <div class="auth-pills">
      <div class="auth-pill on" id="pill-login" onclick="authTab('login')">로그인</div>
      <div class="auth-pill"    id="pill-reg"   onclick="authTab('reg')">회원가입</div>
    </div>

    <!-- 로그인 -->
    <div id="frm-login" class="auth-form">
      <div class="auth-err" id="login-err"></div>
      <div class="f-row"><label>아이디</label><input id="l-user" placeholder="username" autocomplete="username"/></div>
      <div class="f-row"><label>비밀번호</label><input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password"/></div>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
    </div>

    <!-- 회원가입 -->
    <div id="frm-reg" class="auth-form" style="display:none">
      <div class="auth-err" id="reg-err"></div>

</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ════════════════════════════════════════════════
   CONFIG  ← Netlify 환경변수에서 자동 주입
   빌드 없이 쓸 경우 직접 입력:
   window.ENV_SUPABASE_URL = "https://xxx.supabase.co"
   window.ENV_SUPABASE_ANON_KEY = "eyJ..."
════════════════════════════════════════════════ */
const SUPA_URL      = window.ENV_SUPABASE_URL      || '__SUPABASE_URL__';
const SUPA_ANON_KEY = window.ENV_SUPABASE_ANON_KEY || '__SUPABASE_ANON_KEY__';

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let me        = null;   // 현재 로그인 유저
let token     = null;   // JWT
let chatCtx   = null;   // { type:'room'|'dm', id, name }
let rooms     = [];
let users     = [];
let sideMode  = 'rooms';
let dmUnread  = {};
let onlineSet = new Set();
let typingSet = new Set();
let typTimer  = null;
let realtimeCh = null;   // Supabase Realtime channel

let sb = null;  // Supabase client (anon, Realtime용)

/* ════════════════════════════════════════════════
   API helpers
════════════════════════════════════════════════ */
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '오류가 발생했습니다');
  return data;
}

/* ════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════ */
function authTab(t) {
  const login = t === 'login';
  el('pill-login').classList.toggle('on', login);
  el('pill-reg').classList.toggle('on', !login);
  el('frm-login').style.display = login ? 'flex' : 'none';
  el('frm-reg').style.display   = login ? 'none' : 'flex';
}

async function doLogin() {
  const username = v('l-user'), password = v('l-pass');
  const errEl = el('login-err');
  hideErr(errEl);
  if (!username || !password) return showErr(errEl, '아이디와 비밀번호를 입력해주세요');
  try {
    const d = await api('POST', '/api/auth?action=login', { username, password });
    token = d.token; me = d.user;
    saveSession();
    enterApp();
  } catch(e) { showErr(errEl, e.message); }
}

async function doRegister() {
  const username = v('r-user'), display_name = v('r-nick'), password = v('r-pass');
  const errEl = el('reg-err');
  hideErr(errEl);
  if (!username || !display_name || !password) return showErr(errEl, '모든 항목을 입력해주세요');
  try {
    const d = await api('POST', '/api/auth?action=register', { username, display_name, password });
    token = d.token; me = d.user;
    saveSession();
    enterApp();
  } catch(e) { showErr(errEl, e.message); }
}

async function doLogout() {
  try { await api('POST', '/api/auth?action=logout'); } catch {}
  clearSession();
  closeOv('ov-profile');
  leaveApp();
}

/* ════════════════════════════════════════════════
   APP INIT
════════════════════════════════════════════════ */
async function enterApp() {
  el('auth').classList.remove('on');
  el('app').classList.add('on');

  updateNavProfile();
  await Promise.all([loadRooms(), loadUsers()]);
  renderSidebar();
  initSupabase();
}

function leaveApp() {
  unsubRealtime();
  me = null; token = null; chatCtx = null;
  rooms = []; users = [];
  el('app').classList.remove('on');
  el('auth').classList.add('on');
  el('msgs').innerHTML = '';
  el('welcome').style.display = '';
  el('chat-active').style.display = 'none';
}

function updateNavProfile() {
  if (!me) return;
  const av = el('nav-av');
  av.textContent = initials(me.display_name);
  av.style.background = me.avatar_color;
  el('nav-name').textContent   = me.display_name;
  el('nav-status').textContent = me.status_message || '상태 메시지 없음';
}

/* ════════════════════════════════════════════════
   DATA
════════════════════════════════════════════════ */
async function loadRooms() { try { rooms = await api('GET', '/api/rooms'); } catch {} }
async function loadUsers()  { try { users = await api('GET', '/api/users'); } catch {} }

/* ════════════════════════════════════════════════
   SUPABASE REALTIME
════════════════════════════════════════════════ */
function initSupabase() {
  if (!SUPA_URL || SUPA_URL.includes('__')) return; // 환경변수 미설정
  sb = supabase.createClient(SUPA_URL, SUPA_ANON_KEY);
  subscribeRealtime();
}

function subscribeRealtime() {
  if (!sb) return;
  unsubRealtime();

  realtimeCh = sb.channel('chat-global')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
      const row = p.new;
      if (chatCtx?.type === 'room' && chatCtx?.id === row.room_id) {
        // 내가 보낸 건 낙관적 UI로 이미 표시했으므로 sender 확인
        if (row.sender_id !== me?.username) {
          appendMsg(row, true);
        }
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages' }, (p) => {
      const row = p.new;
      const isForMe = row.receiver_id === me?.username;
      if (!isForMe) return;
      if (chatCtx?.type === 'dm' && chatCtx?.id === row.sender_id) {
        appendMsg(row, true);
      } else {
        dmUnread[row.sender_id] = (dmUnread[row.sender_id] || 0) + 1;
        toast(`💬 ${row.sender_name}: ${row.content.slice(0,40)}`);
        renderSidebar();
      }
    })
    .subscribe();
}

function unsubRealtime() {
  if (realtimeCh && sb) { sb.removeChannel(realtimeCh); realtimeCh = null; }
}

/* ════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════ */
function sideTab(tab) {
  sideMode = tab;
  el('t-rooms').classList.toggle('on', tab === 'rooms');
  el('t-dm').classList.toggle('on', tab === 'dm');
  renderSidebar();
}

function renderSidebar() {
  const box = el('sb-content');
  if (sideMode === 'rooms') {
    if (!rooms.length) { box.innerHTML = '<div class="empty-state">채팅방이 없습니다<br/>설정에서 만들어보세요</div>'; return; }
    box.innerHTML = rooms.map(r => `
      <div class="sb-item ${chatCtx?.id === r.id ? 'on' : ''}" onclick="openRoom('${r.id}','${esc(r.name)}')">
        <span class="sb-item-icon">#</span>
        <span class="sb-item-name">${esc(r.name)}</span>
      </div>`).join('');
  } else {
    const others = users.filter(u => u.username !== me?.username);
    if (!others.length) { box.innerHTML = '<div class="empty-state">다른 사용자가 없습니다</div>'; return; }
    box.innerHTML = others.map(u => {
      const live = onlineSet.has(u.username);
      const unread = dmUnread[u.username] || 0;
      return `
      <div class="u-row" onclick="openDm('${esc(u.username)}','${esc(u.display_name)}')">
        <div class="av av-sm" style="background:${u.avatar_color}">${initials(u.display_name)}</div>
        <div class="u-info">
          <div class="u-name">${esc(u.display_name)}</div>
          <div class="u-status-txt">${esc(u.status_message || '상태 메시지 없음')}</div>
        </div>
        <div class="status-pip ${live ? 'live' : ''}"></div>
        ${unread ? `<div class="sb-badge">${unread}</div>` : ''}
      </div>`;
    }).join('');
  }
}

/* ════════════════════════════════════════════════
   OPEN ROOM / DM
════════════════════════════════════════════════ */
async function openRoom(id, name) {
  if (chatCtx?.type === 'room' && chatCtx?.id === id) return;
  chatCtx = { type: 'room', id, name };
  showChatUI();
  setCtx(`# ${name}`, '채팅방');
  renderSidebar();
  clearMsgs();
  try {
    const msgs = await api('GET', `/api/rooms?room_id=${id}&action=msgs`);
    msgs.forEach(m => appendMsg(m, false));
    scrollBot();
  } catch {}
}

async function openDm(username, displayName) {
  if (chatCtx?.type === 'dm' && chatCtx?.id === username) return;
  chatCtx = { type: 'dm', id: username, name: displayName };
  dmUnread[username] = 0;
  showChatUI();
  setCtx(`💬 ${displayName}`, '개인 메시지');
  renderSidebar();
  clearMsgs();
  try {
    const msgs = await api('GET', `/api/messages?type=dm&with=${username}`);
    msgs.forEach(m => appendMsg(m, false));
    scrollBot();
  } catch {}
}

function showChatUI() {
  el('welcome').style.display = 'none';
  const ca = el('chat-active');
  ca.style.display = 'flex';
  ca.style.flexDirection = 'column';
  ca.style.overflow = 'hidden';
}

function setCtx(name, sub) {
  el('ctx-block').style.display = 'flex';
  el('ctx-name').textContent = name;
  el('ctx-sub').textContent  = sub;
}

/* ════════════════════════════════════════════════
   SEND MESSAGE
════════════════════════════════════════════════ */
async function sendMsg() {
  const inp = el('chat-input');
  const content = inp.value.trim();
  if (!content || !chatCtx) return;
  inp.value = '';
  autoH(inp);

  // 낙관적 UI
  const fake = { sender_id: me.username, sender_name: me.display_name, sender_color: me.avatar_color, content, created_at: new Date().toISOString() };
  appendMsg(fake, true);

  try {
    if (chatCtx.type === 'room') {
      await api('POST', '/api/messages', { room_id: chatCtx.id, content });
    } else {
      await api('POST', '/api/messages?type=dm', { receiver: chatCtx.id, content });
    }
  } catch(e) { toast(e.message); }
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  autoH(e.target);
}

function onTyping() {
  autoH(el('chat-input'));
  // (타이핑 표시는 Supabase Realtime presence 확장 시 구현 가능)
}

/* ════════════════════════════════════════════════
   MESSAGE RENDERING
════════════════════════════════════════════════ */
function appendMsg(msg, scroll) {
  const isOwn = msg.sender_id === me?.username;
  const box = el('msgs');
  const row = document.createElement('div');
  row.className = `msg-row${isOwn ? ' own' : ''}`;
  row.innerHTML = `
    <div class="av av-sm" style="background:${msg.sender_color||'#38d9c0'}">${initials(msg.sender_name)}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-who">${esc(msg.sender_name)}</span>
        <span class="msg-ts">${fmtTime(msg.created_at)}</span>
      </div>
      <div class="msg-bub">${esc(msg.content)}</div>
    </div>`;
  box.appendChild(row);
  if (scroll) scrollBot();
}

function appendSys(txt) {
  const box = el('msgs');
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = txt;
  box.appendChild(d);
  scrollBot();
}

function clearMsgs() {
  el('msgs').innerHTML = '';
  typingSet.clear();
  el('typing-bar').style.display = 'none';
}

/* ════════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════════ */
function onSearch(q) {
  const drop = el('s-drop');
  if (!q.trim()) { drop.classList.remove('on'); return; }
  const lq = q.toLowerCase();
  const rr = rooms.filter(r => r.name.toLowerCase().includes(lq));
  const uu = users.filter(u => u.username !== me?.username &&
    (u.display_name.toLowerCase().includes(lq) || u.username.toLowerCase().includes(lq)));
  if (!rr.length && !uu.length) { drop.classList.remove('on'); return; }
  drop.innerHTML = [
    ...rr.map(r => `<div class="s-item" onclick="openRoom('${r.id}','${esc(r.name)}')"><span style="font-size:16px">#</span><div><div>${esc(r.name)}</div><div class="s-item-sub">채팅방</div></div></div>`),
    ...uu.map(u => `<div class="s-item" onclick="openDm('${esc(u.username)}','${esc(u.display_name)}')"><div class="av av-sm" style="background:${u.avatar_color}">${initials(u.display_name)}</div><div><div>${esc(u.display_name)}</div><div class="s-item-sub">@${esc(u.username)}</div></div></div>`),
  ].join('');
  drop.classList.add('on');
}
function closeSearch() {
  el('s-drop').classList.remove('on');
  el('s-input').value = '';
}

/* ════════════════════════════════════════════════
   PROFILE
════════════════════════════════════════════════ */
function openProfile() {
  if (!me) return;
  el('pf-av').textContent     = initials(me.display_name);
  el('pf-av').style.background = me.avatar_color;
  el('pf-dn').textContent     = me.display_name;
  el('pf-un').textContent     = me.username;
  el('pf-name').value         = me.display_name;
  el('pf-status').value       = me.status_message || '';
  openOv('ov-profile');
}

async function saveProfile() {
  const display_name = el('pf-name').value.trim();
  const status_message = el('pf-status').value.trim();
  if (!display_name) { toast('닉네임을 입력해주세요'); return; }
  try {
    const d = await api('PUT', '/api/users?action=profile', { display_name, status_message });
    token = d.token;
    me.display_name = display_name;
    me.status_message = status_message;
    saveSession();
    updateNavProfile();
    closeOv('ov-profile');
    toast('프로필이 저장되었습니다 ✓');
  } catch(e) { toast(e.message); }
}

/* ════════════════════════════════════════════════
   SETTINGS
════════════════════════════════════════════════ */
function openSettings() {
  el('dark-tog').checked = document.documentElement.getAttribute('data-theme') === 'dark';
  openOv('ov-settings');
}

function toggleTheme(cb) {
  document.documentElement.setAttribute('data-theme', cb.checked ? 'dark' : 'light');
  localStorage.setItem('theme', cb.checked ? 'dark' : 'light');
}

function openCreateRoom() {
  closeOv('ov-settings');
  setTimeout(() => openOv('ov-create'), 100);
}

async function createRoom() {
  const name = el('new-room-inp').value.trim();
  if (!name) { toast('채팅방 이름을 입력해주세요'); return; }
  try {
    const room = await api('POST', '/api/rooms', { name });
    rooms.push(room);
    renderSidebar();
    closeOv('ov-create');
    el('new-room-inp').value = '';
    toast(`'${name}' 채팅방이 생성됐습니다 ✓`);
    openRoom(room.id, room.name);
  } catch(e) { toast(e.message); }
}

/* ════════════════════════════════════════════════
   PANEL HELPERS
════════════════════════════════════════════════ */
function openOv(id)  { el(id).classList.add('on'); }
function closeOv(id) { el(id).classList.remove('on'); }
function ovClick(e, id) { if (e.target === el(id)) closeOv(id); }

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
const el  = id => document.getElementById(id);
const v   = id => el(id).value.trim();
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function initials(name) { return (name || '?')[0].toUpperCase(); }

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function scrollBot() {
  const c = el('msgs');
  c.scrollTop = c.scrollHeight;
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
function hideErr(el) { el.style.display = 'none'; }

let toastTimer;
function toast(msg) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 3000);
}

// 세션 저장/복원
function saveSession() {
  localStorage.setItem('chat_token', token);
  localStorage.setItem('chat_me', JSON.stringify(me));
}
function clearSession() {
  localStorage.removeItem('chat_token');
  localStorage.removeItem('chat_me');
}
function loadSession() {
  token = localStorage.getItem('chat_token');
  try { me = JSON.parse(localStorage.getItem('chat_me') || 'null'); } catch { me = null; }
}

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
(async function boot() {
  // 테마 복원
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);

  // 세션 복원 시도
  loadSession();
  if (token && me) {
    try {
      const fresh = await api('GET', '/api/auth?action=me');
      me = fresh;
      saveSession();
      enterApp();
      return;
    } catch { clearSession(); }
  }

  // 세션 없음 → auth 화면
  el('auth').classList.add('on');

  // 키보드 단축키
  ['l-user','l-pass'].forEach(id => el(id).addEventListener('keydown', e => e.key==='Enter' && doLogin()));
  ['r-user','r-nick','r-pass'].forEach(id => el(id).addEventListener('keydown', e => e.key==='Enter' && doRegister()));
})();
</script>
