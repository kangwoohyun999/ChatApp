[build]
  publish = "dist"
  functions = "netlify/functions"
  command = "node scripts/inject-env.js"

[functions]
  node_bundler = "esbuild"

# API 경로를 Functions으로 프록시
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA 폴백
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "echo 'netlify dev ready'"
  port = 8888
  targetPort = 3000
